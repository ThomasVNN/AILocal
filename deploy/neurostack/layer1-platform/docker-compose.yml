name: neurostack-platform

# NeuroStack — Layer 1 Platform
# Brand: neurostack (isolated từ localagent brand)
# Networks: neurostack_platform (internal), neurostack_edge (external via Traefik)
# Data root: ${NS_DATA_ROOT}

services:
  postgres-primary:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      POSTGRES_DB: ${POSTGRES_DB:-neurostack}
      POSTGRES_USER: ${POSTGRES_USER:-neurostack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/env/nstack.local.env}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    volumes:
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/db/primary:/var/lib/postgresql/data
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/logs/postgres:/var/log/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-neurostack} -d ${POSTGRES_DB:-neurostack}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      POSTGRES_HOST: postgres-primary
      POSTGRES_DB: ${POSTGRES_DB:-neurostack}
      POSTGRES_USER: ${POSTGRES_USER:-neurostack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/env/nstack.local.env}
      SCHEDULE: "${POSTGRES_BACKUP_SCHEDULE:-0 */6 * * *}"
      BACKUP_KEEP_DAYS: ${POSTGRES_BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${POSTGRES_BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${POSTGRES_BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/backups/postgres:/backups
    networks:
      - platform

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in deploy/env/nstack.local.env}
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/redis/data:/data
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/logs/redis:/var/log/redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in deploy/env/nstack.local.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/env/nstack.local.env}
    volumes:
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/minio/data:/data
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/logs/minio:/var/log/minio
    networks:
      - platform
    labels:
      - traefik.enable=true
      - traefik.docker.network=neurostack_edge
      - traefik.http.routers.ns-minio-api.rule=Host(`${MINIO_API_HOST}`)
      - traefik.http.routers.ns-minio-api.entrypoints=web
      - traefik.http.routers.ns-minio-api.middlewares=ns-secure-headers@file,ns-ratelimit@file
      - traefik.http.routers.ns-minio-api.service=ns-minio-api
      - traefik.http.services.ns-minio-api.loadbalancer.server.port=9000
      - traefik.http.routers.ns-minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)
      - traefik.http.routers.ns-minio-console.entrypoints=web
      - traefik.http.routers.ns-minio-console.middlewares=ns-secure-headers@file,ns-ratelimit@file
      - traefik.http.routers.ns-minio-console.service=ns-minio-console
      - traefik.http.services.ns-minio-console.loadbalancer.server.port=9001

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
          sleep 2;
        done;
        mc mb --ignore-existing "local/${MINIO_BOOTSTRAP_BUCKET:-nstack-webui}";
    networks:
      - platform

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${TRAEFIK_HTTP_PORT:-81}:80"
      - "${TRAEFIK_HTTPS_PORT:-9443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8089}:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/proxy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/proxy/traefik/certs:/etc/traefik/certs:ro
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/proxy/acme:/acme
      - ${NS_DATA_ROOT:-/data/neurostack}/platform/logs/traefik:/var/log/traefik
    networks:
      edge:
        aliases:
          - ${TRAEFIK_DASHBOARD_HOST:-traefik.nstack.local}
          - ${OMNIROUTER_HOST:-router.nstack.local}
          - ${OMNIROUTER_API_HOST:-api.nstack.local}
          - ${OPENWEBUI_HOST:-chat.nstack.local}
          - ${OPENCLAW_HOST:-claw.nstack.local}
          - ${MINIO_API_HOST:-s3.nstack.local}
          - ${MINIO_CONSOLE_HOST:-minio.nstack.local}
      platform: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=neurostack_edge
      - traefik.http.routers.ns-traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.nstack.local}`)
      - traefik.http.routers.ns-traefik.entrypoints=web
      - traefik.http.routers.ns-traefik.service=api@internal
      - traefik.http.routers.ns-traefik.middlewares=ns-secure-headers@file,ns-ratelimit@file

networks:
  platform:
    name: neurostack_platform
    driver: bridge
    internal: true
  edge:
    name: neurostack_edge
    driver: bridge
