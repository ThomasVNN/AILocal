bind 0.0.0.0
port 6379
protected-mode yes

appendonly yes
appendfsync everysec

save 900 1
save 300 10
save 60 10000

# Memory limit — prevents OOM on M1 Mac (16GB shared with all containers)
# Adjust up for server deployments: 512mb–1gb recommended
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log
