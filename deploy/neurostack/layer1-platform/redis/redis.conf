bind 0.0.0.0
port 6379
protected-mode yes

appendonly yes
appendfsync everysec

save 900 1
save 300 10
save 60 10000

# Memory limit — must be less than container memory limit (NS_REDIS_MEM_LIMIT)
# Dev: 300M container → 200mb data + ~100M overhead
# UAT: 200M container → 150mb data + ~50M overhead
# Adjust this value when changing NS_REDIS_MEM_LIMIT in env file
maxmemory 150mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log
